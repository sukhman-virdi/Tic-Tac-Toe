<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign In - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		html, body{
			width: 100%;
			margin: 2% auto;
		}
        h1{
            font-family:"Purple Purse", serif;;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
		.card{
			width: 70%;
		}
    </style>
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Sign In</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">GameUser Sign In</h5></div>
		<div class="card-body">
			<form action="login_user.php" method="post">
				<div class="mb-3">
					<label class="form-label">Username</label>
					<input type="text" name="Username" class="form-control" placeholder="user_x">
				</div>
				<div class="mb-3">
					<label class="form-label">Password</label>
					<input type="text" name="Password" class="form-control" placeholder="Enter password">
				</div>
				<div class="mb-3">
					<label class="form-label">Role</label>
					<select name="Role" class="form-control">
						<option value="">-- Select Role --</option>
						<option value="player">Player</option>
						<option value="manager">Tournament Manager</option>
					</select>
				</div>
				<button type="submit" class="btn btn-success w-100">Sign In</button>
			</form>

            <div class="text-center mt-3">
                <small>Don't have an account? 
                    <a href="SignUp.html">Sign up</a>
                </small>
            </div>

		</div>
	</div>
	<br><a href="index.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
