<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Admin Sign Up - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
		html, body{
			width: 100%;
			margin: 2% auto;
		}
        h1{
            font-family:"Purple Purse", serif;;
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
        }
		.card{
			width: 70%;
		}
    </style>
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Admin Sign Up</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Admin Registration</h5></div>
		<div class="card-body">
			<form action="adminSignUp.php" method="post">
				<div class="mb-3">
					<label class="form-label">Admin ID</label>
					<input type="text" name="AdminID" class="form-control" placeholder="e.g. 6">
				</div>
				<div class="mb-3">
					<label class="form-label">Full Name</label>
					<input type="text" name="Name" class="form-control" placeholder="e.g. Jane Smith">
				</div>
				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="text" name="Email" class="form-control" placeholder="e.g. jane@email.com">
				</div>
				<div class="mb-3">
					<label class="form-label">Password</label>
					<input type="text" name="Password" class="form-control" placeholder="Enter password">
				</div>
				<div class="mb-3">
					<label class="form-label">Level <span class="text-muted">(1=Operations, 2=Management, 3=Moderation, 4=Support, 5=Development)</span></label>
					<input type="number" name="Level" class="form-control" placeholder="e.g. 1">
				</div>
				<button type="submit" class="btn btn-danger w-100">Sign Up as Admin</button>
			</form>
		</div>
	</div>
	<br><a href="index.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
