<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Game Manager Home - TicTacToe Game Organizer</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredericka+the+Great&family=Purple+Purse&display=swap" rel="stylesheet">
    <style>
        #achievementText{
            font-size: 2.8vw;
        }
        #tournamentText{
            font-size: 3.5vw;
        }
    </style>
</head>
<body>
	<h1>You are a game manager!</h1>
    <h2>What are you gonna do?</h2>
    <div id="selections">
        <div class="choice" onclick="host()">
            <img src="images/tournament_3069131.png" alt="" >
            <h3 id="tournamentText">Host a Tournament</h3>
        </div>
        <div class="choice" onclick="see()">
            <img src="images/parchment_2682065.png" alt="">
            <h3 id="achievementText">See Records and Achievements</h3>
        </div>
    </div>
    <script>
        function host() {
            window.location.href = "";
        }

         function see() {
            window.location.href = "";
        }
    </script>
</body>
</html>
