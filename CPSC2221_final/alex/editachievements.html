<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Achievements - TicTacToe Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="editachievements.css"/> 
</head>
<body>

  <div class="sidebar">
    <nav class="sidebar-nav">
      <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
      <button class="nav-btn" onclick="window.location.href='game.html'">🎮 Play</button>
      <button class="nav-btn">🏆 Leaderboard</button>
      <button class="nav-btn" id="profile-btn">👤 Profile</button>
    </nav>
  </div>

  <main class="main">
    <div class="page-wrapper">
      <h1 class="title">Edit Achievements</h1>

      <div class="layout-row">  

        <!-- Left: Search Panel -->
        <div class="search-panel">
          <div class="form-group">
            <label>Achievement Title</label>
            <input type="text" id="search-title" placeholder="Achievement Title" oninput="filterTable()"/>
          </div>
          <div class="form-group">
            <label>Achievement ID</label>
            <input type="number" id="search-id" placeholder="Achievement ID" min="0" oninput="filterTable()"/>
          </div>
          <button class="search-btn" onclick="filterTable()">
            Search
          </button>
        </div>

        <!-- Right: Results + Actions -->
        <div class="results-panel">
          <div class="results-box">
            <table class="results-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Description</th>
                </tr>
              </thead>
              <tbody id="achievements-tbody">
                <tr><td colspan="3">Loading...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="action-row">
            <button class="action-btn edit-btn" onclick="openEditSelected()">✏️ Edit</button>
            <button class="action-btn add-btn"  onclick="openAddModal()">➕ Add</button>
            <button class="action-btn delete-btn" onclick="openDeleteSelected()">🗑️ Delete</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-title">Edit Achievement</h2>
      <input type="hidden" id="edit-id"/>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="edit-title" placeholder="Achievement title"/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="edit-desc" placeholder="Achievement description" rows="3"></textarea>
      </div>
      <p class="result-msg" id="edit-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn edit-btn" onclick="saveEdit()">Save Changes</button>
        <button class="action-btn delete-btn" onclick="closeModal('edit-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-title">Add New Achievement</h2>
      <div class="form-group">
        <label>Achievement ID</label>
        <input type="number" id="add-id" placeholder="e.g. 6"/>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="add-title" placeholder="e.g. Veteran"/>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="add-desc" placeholder="e.g. Play 50 matches" rows="3"></textarea>
      </div>
      <p class="result-msg" id="add-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn add-btn" onclick="addAchievement()">Add Achievement</button>
        <button class="action-btn delete-btn" onclick="closeModal('add-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="delete-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-title" style="color:#e83611;">Delete Achievement</h2>
      <p class="warning-msg">⚠️ Warning: Deleting this achievement will also delete all related records.</p>
      <p class="delete-confirm-text">Are you sure you want to delete: <strong id="delete-name"></strong>?</p>
      <input type="hidden" id="delete-id"/>
      <p class="result-msg" id="delete-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn delete-btn" onclick="confirmDelete()">Yes, Delete</button>
        <button class="action-btn edit-btn" onclick="closeModal('delete-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Popup -->
  <div id="popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div class="modal-box" style="text-align:center;">
      <h2 class="modal-title" id="popup-title"></h2>
      <p id="popup-message" style="font-family:'Nunito',sans-serif; color:#444;"></p>
      <button class="action-btn add-btn" onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    let allAchievements = [];
    let selectedID = null;

    loadAchievements();

    fetch('get_session.php')
      .then(res => res.json())
      .then(data => {
        const profileBtn = document.getElementById('profile-btn');
        profileBtn.onclick = () => window.location.href = data.loggedIn
          ? `profile.html?id=${data.userID}`
          : 'login.html';
      });

    function loadAchievements() {
      fetch('achievement_handler.php?action=all')
        .then(res => res.json())
        .then(data => {
          allAchievements = data;
          renderTable(data);
        });
    }

    function renderTable(data) {
      const tbody = document.getElementById('achievements-tbody');
      tbody.innerHTML = '';
      selectedID = null;

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">No achievements found</td></tr>';
        return;
      }

      data.forEach(a => {
        const row = document.createElement('tr');
        row.setAttribute('data-id', a.AchievementID);
        row.innerHTML = `
          <td>${a.AchievementID}</td>
          <td>${a.Title}</td>
          <td>${a.Description}</td>
        `;
        row.addEventListener('click', () => selectRow(row, a.AchievementID));
        tbody.appendChild(row);
      });
    }

    function selectRow(row, id) {
      // Deselect all rows
      document.querySelectorAll('.results-table tbody tr').forEach(r => {
        r.classList.remove('selected');
      });
      // Select clicked row
      row.classList.add('selected');
      selectedID = id;
    }

    function filterTable() {
      const titleSearch = document.getElementById('search-title').value.toLowerCase();
      const idSearch    = document.getElementById('search-id').value;

      const filtered = allAchievements.filter(a => {
        const matchTitle = a.Title.toLowerCase().includes(titleSearch);
        const matchID    = idSearch === '' || a.AchievementID.toString() === idSearch;
        return matchTitle && matchID;
      });

      renderTable(filtered);
    }

    // ── Edit ──
    function openEditSelected() {
      if (!selectedID) {
        alert('Please select an achievement from the list first.');
        return;
      }
      const achievement = allAchievements.find(a => a.AchievementID == selectedID);
      document.getElementById('edit-id').value    = achievement.AchievementID;
      document.getElementById('edit-title').value = achievement.Title;
      document.getElementById('edit-desc').value  = achievement.Description;
      document.getElementById('edit-msg').textContent = '';
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function saveEdit() {
      const id    = document.getElementById('edit-id').value;
      const title = document.getElementById('edit-title').value.trim();
      const desc  = document.getElementById('edit-desc').value.trim();
      const msg   = document.getElementById('edit-msg');

      if (!title || !desc) {
        msg.textContent = 'Please fill in all fields';
        msg.className = 'result-msg error';
        return;
      }

      const formData = new FormData();
      formData.append('action', 'update');
      formData.append('AchievementID', id);
      formData.append('Title', title);
      formData.append('Description', desc);

      fetch('achievement_handler.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            closeModal('edit-modal');
            showPopup('✅ Updated!', 'Achievement has been updated successfully.');
            loadAchievements();
          } else {
            msg.textContent = data.error || 'Failed to update';
            msg.className = 'result-msg error';
          }
        });
    }

    // ── Add ──
    function openAddModal() {
      document.getElementById('add-id').value    = '';
      document.getElementById('add-title').value = '';
      document.getElementById('add-desc').value  = '';
      document.getElementById('add-msg').textContent = '';
      document.getElementById('add-modal').style.display = 'flex';
    }

    function addAchievement() {
      const id    = document.getElementById('add-id').value;
      const title = document.getElementById('add-title').value.trim();
      const desc  = document.getElementById('add-desc').value.trim();
      const msg   = document.getElementById('add-msg');

      if (!id || !title || !desc) {
        msg.textContent = 'Please fill in all fields';
        msg.className = 'result-msg error';
        return;
      }

      const formData = new FormData();
      formData.append('action', 'add');
      formData.append('AchievementID', id);
      formData.append('Title', title);
      formData.append('Description', desc);

      fetch('achievement_handler.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            closeModal('add-modal');
            showPopup('✅ Added!', `"${title}" has been added successfully.`);
            loadAchievements();
          } else {
            msg.textContent = data.error || 'Failed to add achievement';
            msg.className = 'result-msg error';
          }
        });
    }

    // ── Delete ──
    function openDeleteSelected() {
      if (!selectedID) {
        alert('Please select an achievement from the list first.');
        return;
      }
      const achievement = allAchievements.find(a => a.AchievementID == selectedID);
      document.getElementById('delete-id').value         = achievement.AchievementID;
      document.getElementById('delete-name').textContent = achievement.Title;
      document.getElementById('delete-msg').textContent  = '';
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function confirmDelete() {
      const id  = document.getElementById('delete-id').value;
      const msg = document.getElementById('delete-msg');

      const formData = new FormData();
      formData.append('action', 'delete');
      formData.append('AchievementID', id);

      fetch('achievement_handler.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            closeModal('delete-modal');
            showPopup('🗑️ Deleted!', 'Achievement and all related records have been deleted.');
            loadAchievements();
          } else {
            msg.textContent = data.error || 'Failed to delete';
            msg.className = 'result-msg error';
          }
        });
    }

    // ── Helpers ──
    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    function showPopup(title, message) {
      document.getElementById('popup-title').textContent   = title;
      document.getElementById('popup-message').textContent = message;
      document.getElementById('popup').style.display = 'flex';
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }

    // Close modal clicking outside
    ['edit-modal', 'add-modal', 'delete-modal', 'popup'].forEach(id => {
      document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
      });
    });
  </script>

</body>
</html>
