<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="leaderboard.css"/>
</head>
<body>
 
  <div class="sidebar">
    <nav class="sidebar-nav">
      <button class="nav-btn" onclick="window.location.href='home.html'">🏠 Home</button>
      <button class="nav-btn" onclick="window.location.href='game.html'">🎮 Play</button>
      <button class="nav-btn" onclick="window.location.href='leaderboard.html'">🏆 Leaderboard</button>
      <button class="nav-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
      <p class="signout-link">
        <a href="logout.php">Sign Out</a>
      </p>
    </nav>
  </div> 
 
  <main class="main">
    <div class="card">
      <h1 class="title">Leaderboard</h1>
    <div class="boxes-row"> 
    <div class="box"> 
  <h3>Top Players</h3>  
  <p id="statsP" style="text-align: right">Total number of players:  | Average points: </p>
  <hr/>
  <table class="box-table">
        <thead>
        <tr>
            <th>Rank</th>
            <th>Username</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Draws</th>
            <th>Ranked Points</th>
        </tr>    
        </thead>
        <tbody id="players-tbody"></tbody>
    </table>
    <div id="current-user"></div>
    </div>
    </div>  
 
    


    </div>  
  </main>
</div> 
  
<script>
  fetch('total_stats.php')
  .then(res => res.json())
  .then(data => {
    const stats = document.getElementById('statsP');
    
    if (stats) {
      // Use backticks for template literals
      stats.textContent = `Number of Players: ${data.totalPlayers} | Average Points: ${data.avgPoints}`;
    }
  })
  .catch(err => console.error("Error loading stats: ", err));

  fetch('display_players.php')
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById('players-tbody');
      const currentUserDiv = document.getElementById('current-user');
      
      tbody.innerHTML = '';

      if (data.topPlayers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6">No players yet</td></tr>';
        return;
      }

      let currentUserInTop10 = false;

      data.topPlayers.forEach((player, index) => {
        const row = document.createElement('tr');
        const isCurrentUser = data.currentUser && player.PlayerID == data.currentUser.PlayerID;

        if (isCurrentUser) {
          currentUserInTop10 = true;
          row.style.backgroundColor = '#ffe9b2';
        }

        // Always set row content regardless of whether it's the current user
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${player.Username}</td>
          <td>${player.TotalWins}</td>
          <td>${player.TotalLosses}</td>
          <td>${player.TotalDraws}</td>
          <td>${player.RankingPoints}</td>
        `;

        tbody.appendChild(row);
      });

      // If logged in but not in top 10, show them at the bottom
      if (data.currentUser && !currentUserInTop10) {
        const separatorRow = document.createElement('tr');
        separatorRow.innerHTML = `<td colspan="6" style="text-align:center; color:#aaa; letter-spacing:4px; padding:6px;">• • •</td>`;
        tbody.appendChild(separatorRow);

        const userRow = document.createElement('tr');
        userRow.style.backgroundColor = '#ffe9b2';
        userRow.innerHTML = `
          <td>${data.currentUser.Rank ?? '—'}</td>
          <td>${data.currentUser.Username}</td>
          <td>${data.currentUser.TotalWins}</td>
          <td>${data.currentUser.TotalLosses}</td>
          <td>${data.currentUser.TotalDraws}</td>
          <td>${data.currentUser.RankingPoints}</td>
        `;
        tbody.appendChild(userRow);
      }

      currentUserDiv.innerHTML = '';
    })
    .catch(err => console.log('Error loading players:', err));
  </script>


</body> 
</html>
