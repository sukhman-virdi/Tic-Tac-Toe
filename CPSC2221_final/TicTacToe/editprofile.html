<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe - Edit Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="createaccount.css"/> 
</head>
<body>

  <div class="sidebar">
    <nav class="sidebar-nav">
      <button class="nav-btn" onclick="window.location.href='home.html'">🏠 Home</button>
      <button class="nav-btn" onclick="window.location.href='game.html'">🎮 Play</button>
      <button class="nav-btn" onclick="window.location.href='leaderboard.html'">🏆 Leaderboard</button>
      <button class="nav-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
      <p class="signout-link">
        <a href="logout.php">Sign Out</a>
      </p>
    </nav>
  </div> 

  <main class="main">
    <div class="card">
      <h1 class="title">Edit Profile</h1>


      <div class="form-group">
        <label for="username">Change Username</label>
        <input type="text" id="username" placeholder="Username"/>
        <span class="field-msg" id="username-msg"></span>
      </div>

      <div class="form-group">
        <label for="email">Change Email</label>
        <input type="email" id="email" placeholder="Email"/>
        <span class="field-msg" id="email-msg"></span>
      </div>

      <div class="form-group">
        <label for="currentPassword">Enter Current Password</label>
        <input type="password" id="currentPassword" placeholder="Current password"/>
        <span class="field-msg" id="email-msg"></span>
      </div>

      <div class="form-group">
        <label for="password">Change Password</label>
        <input type="password" id="password" placeholder="Enter New password"/>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm password"/>
        <span class="field-msg" id="password-msg"></span>
      </div>

      <button class="btn btn-play" onclick="handleChanges()">
        <span>Save Changes</span>
      </button>

      <p class="result-msg" id="result-msg"></p>

    </div>
  </main>

  <script>
  // Get current user info and pre-fill the fields
    currentUsername="";
    currentEmail="";
    fetch('get_user.php')
        .then(res => res.json())
        .then(user => {
        document.getElementById('username').value = user.Username;
        document.getElementById('email').value    = user.Email;
        currentUsername=user.Username;
        currentEmail=user.Email;
        })
        .catch(err => console.log('Error loading user:', err));
    
    // Check username availability as user types
    document.getElementById('username').addEventListener('input', function() {
      username = this.value.trim();
      msg = document.getElementById('username-msg');

      if (username.length < 3) {
        msg.textContent = 'Username must be at least 3 characters';
        msg.className = 'field-msg error';
        return;
      }

      //If the customer is changing the username, ensure the username is available
     if (username!==currentUsername) {
        fetch(`check_availability.php?field=Username&value=${encodeURIComponent(username)}`)
            .then(res => res.json())
            .then(data => {
            if (data.taken) {
                msg.textContent = '✗ Username already taken';
                msg.className = 'field-msg error';
            } else {
                msg.textContent = '✓ Username available';
                msg.className = 'field-msg success';
            }
            });
        }});

    // Check email availability as user types
        document.getElementById('email').addEventListener('input', function() {
            const email = this.value.trim();
            const msg = document.getElementById('email-msg');

            if (!email.includes('@')) return;

            //If the customer is trying to change the email
            if(email!==currentEmail){
                fetch(`check_availability.php?field=Email&value=${encodeURIComponent(email)}`)
                    .then(res => res.json())
                    .then(data => {
                    if (data.taken) {
                        msg.textContent = '✗ Email already registered';
                        msg.className = 'field-msg error';
                    } else {
                        msg.textContent = '✓ Email available';
                        msg.className = 'field-msg success';
                    }
                    });
                }});
        



        ///----------------HANDLE CHANGES-----------------//
        function handleChanges() {
            const username        = document.getElementById('username').value.trim();
            const email           = document.getElementById('email').value.trim();
            const currentPassword = document.getElementById('currentPassword').value.trim();
            const newPassword     = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirm-password').value.trim();

            const resultMsg = document.getElementById('result-msg');

            // Require current password
            if (!currentPassword) {
                resultMsg.textContent = 'Please enter your current password to authorize changes';
                resultMsg.className = 'result-msg error';
                return;
            }

            // Check new password match
            if (newPassword && newPassword !== confirmPassword) {
                resultMsg.textContent = 'New passwords do not match';
                resultMsg.className = 'result-msg error';
                return;
            }

            const formData = new FormData();
            formData.append('username', username);
            formData.append('email', email);
            formData.append('currentPassword', currentPassword);
            formData.append('newPassword', newPassword);

            fetch('update_profile.php', {
                method: 'POST',
                body: formData
            })
                .then(res => res.json())
                .then(data => {
                if (data.success) {
                    alert('Profile updated!');
                    window.location.href = 'profile.html';
                } else {
                    resultMsg.textContent = data.error || 'Update failed';
                    resultMsg.className = 'result-msg error';
                }
                })
                .catch(() => {
                resultMsg.textContent = 'Server error';
                });
            }
        

        
    

</script>

</body>
</html>
