<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oversee People - TicTacToe Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="editachievements.css"/> 
</head>
<body>

  <div class="sidebar">
    <nav class="sidebar-nav">
      <button class="nav-btn" onclick="window.location.href='adminHome.html'">🏠 Home</button>
      <button class="nav-btn" onclick="window.location.href=''">👥 Oversee People</button>
      <button class="nav-btn" onclick="window.location.href='editAdmin.html'">✏️ Edit Admins</button>
      <button class="nav-btn" onclick="window.location.href='editachievements.html'">🏆 Edit Achievement</button>
      <button class="nav-btn" onclick="window.location.href='adminProfile.html'">👤 Profile</button>
    </nav>
  </div>

  <main class="main">
    <div class="page-wrapper">
      <h1 class="title">Oversee People</h1>

      <div class="layout-row">  

        <!-- Left: Search Panel -->
        <div class="search-panel">
          <div class="form-group">
            <label>Admin ID</label>
            <input type="number" id="search-adminID" placeholder="Admin ID"  min="0" oninput="filterTable()"/>
          </div>
          <div class="form-group">
            <label>User ID</label>
            <input type="number" id="search-userID" placeholder="User ID" min="0" oninput="filterTable()"/>
          </div>
          <button class="search-btn" onclick="filterTable()">
            Search
          </button>
          <div>
          <label>
          <input type="checkbox" id="filter-reviewed" onchange="loadAllReviewed()">
          All Admins Reviewed
          </label>
          </div>
          <div>
            <label>
            <input type="checkbox" id="filter-join" onchange="loadJoin()" checked>
            Show admin comments
            </label>
          </div>
        </div>
        <!-- Right: Results + Actions -->
        <div class="results-panel">
          <div class="results-box">
            <table class="results-table">
              <thead>
                <tr>
                  <th>UserID</th>
                  <th>UserName</th>
                  <th>UserEmail</th>
                  <th>AdminID</th>
                  <th>Admin_Comments</th>
                </tr>
              </thead>
              <tbody id="people-tbody">
                <tr><td colspan="3">Loading...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="action-row">
            <button class="action-btn edit-btn" onclick="openEditSelected()">✏️ Edit Comments</button>
            <button class="action-btn delete-btn" onclick="openDeleteSelected()">🗑️ Delete User</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Edit Modal -->
  <div id="edit-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-user">Edit Admin Comment</h2>
      <input type="hidden" id="edit-id"/>
      <div class="form-group">
        <label>Admin Comment</label>
        <textarea id="edit-comment" placeholder="Admin Comments" rows="3"></textarea>
      </div>
      <p class="result-msg" id="edit-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn edit-btn" onclick="saveEdit()">Save Changes</button>
        <button class="action-btn delete-btn" onclick="closeModal('edit-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Add Modal -->
  <div id="add-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-user">Add New Comments</h2>
      <div class="form-group">
        <label>User ID</label>
        <input type="number" id="add-id" placeholder="e.g. 6"/>
      </div>
      <div class="form-group">
        <label>Comments</label>
        <textarea id="add-comments" placeholder="e.g. Occasional disputes" rows="3"></textarea>
      </div>
      <p class="result-msg" id="add-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn add-btn" onclick="addComment()">Add Comments</button>
        <button class="action-btn delete-btn" onclick="closeModal('add-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div id="delete-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div class="modal-box">
      <h2 class="modal-user" style="color:#e83611;">Delete User</h2>
      <p class="warning-msg">⚠️ Warning: Deleting this Comments will also delete all related records.</p>
      <p class="delete-confirm-text">Are you sure you want to delete: <strong id="delete-name"></strong>?</p>
      <input type="hidden" id="delete-id"/>
      <p class="result-msg" id="delete-msg"></p>
      <div class="modal-buttons">
        <button class="action-btn delete-btn" onclick="confirmDelete()">Yes, Delete</button>
        <button class="action-btn edit-btn" onclick="closeModal('delete-modal')">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Popup -->
  <div id="popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000;">
    <div class="modal-box" style="text-align:center;">
      <h2 class="modal-user" id="popup-user"></h2>
      <p id="popup-message" style="font-family:'Nunito',sans-serif; color:#444;"></p>
      <button class="action-btn add-btn" onclick="closePopup()">OK</button>
    </div>
  </div>

  <script>
    let adminIDForSession = null;
    let allUsers = [];
    let selectedID = null;


    fetch('get_adminSession.php')
      .then(res => res.json())
      .then(data => {
        if (!data.loggedIn) {
          alert('Please login first');
          window.location.href = 'adminLogin.html';
          return;
        }

        adminIDForSession = data.adminID;
        loadUser();
      });

    // fetch('get_session.php')
    //   .then(res => res.json())
    //   .then(data => {
    //     const profileBtn = document.getElementById('profile-btn');
    //     profileBtn.onclick = () => window.location.href = data.loggedIn
    //       ? `profile.html?id=${data.userID}`
    //       : 'login.html';
    //   });

    function loadUser() {
      fetch('people_handler.php?action=all')
        .then(res => res.json())
        .then(data => {
          allUsers = data;
          renderTable(data, true);
        });
    }

    function renderTable(data, showComments = true) {
      const tbody = document.getElementById('people-tbody');
      tbody.innerHTML = '';
      selectedID = null;
      const thead = document.querySelector('.results-table thead');
      thead.innerHTML = showComments? `<tr>
              <th>UserID</th><th>UserName</th><th>UserEmail</th>
              <th>AdminID</th><th>Admin_Comments</th>
            </tr>`: `<tr>
              <th>UserID</th><th>UserName</th><th>UserEmail</th>
            </tr>`;

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3">No comments found</td></tr>';
        return;
      }

       data.forEach(a => {
        const row = document.createElement('tr');
        row.setAttribute('data-id', a.UserID);
        row.innerHTML = `
            <td>${a.UserID}</td>
            <td>${a.Username}</td>
            <td>${a.Email}</td>
            ${showComments ? `<td>${a.AdminID}</td><td>${a.Admin_Comments}</td>` : ''}
        `;
        row.addEventListener('click', () => selectRow(row, a.UserID));
        tbody.appendChild(row);
    });
    }

    function selectRow(row, id) {
      // Deselect all rows
      document.querySelectorAll('.results-table tbody tr').forEach(r => {
        r.classList.remove('selected');
      });
      // Select clicked row
      row.classList.add('selected');
      selectedID = id;
    }

    function filterTable() {
      const adminIDSearch = document.getElementById('search-adminID').value;
      const userIDSearch  = document.getElementById('search-userID').value;
      console.log('allUsers:', allUsers);
      console.log('adminIDSearch:', adminIDSearch, typeof adminIDSearch);
      console.log('userIDSearch:', userIDSearch, typeof userIDSearch);
      const filtered = allUsers.filter(a => {
        const matchAdmin = adminIDSearch === '' || (a.AdminID != null && a.AdminID.toString() === adminIDSearch);
        const matchUser  = userIDSearch === ''  || a.UserID.toString() === userIDSearch;
        return matchAdmin && matchUser;
      });

      renderTable(filtered);
    }
    function loadAllReviewed() {
        let isAll = document.getElementById('filter-reviewed').checked;
        if(isAll){
        fetch('people_handler.php?action=all_reviewed')
          .then(res => res.json())
          .then(data => {
              allUsers = data;
              renderTable(data);
          }
          );
        }else{
          loadUser();
        }
    }

    // ── Edit ──
    function openEditSelected() {
      if (!selectedID) {
        alert('Please select a user from the list first.');
        return;
      }
      const user = allUsers.find(a => a.UserID  == selectedID);
      document.getElementById('edit-id').value = user.UserID;
      document.getElementById('edit-comment').value = user.Admin_Comments;
      document.getElementById('edit-msg').textContent = '';
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function saveEdit() {
      const id    = document.getElementById('edit-id').value;
      const adminID = adminIDForSession;
      const comments = document.getElementById('edit-comment').value.trim();
      const msg   = document.getElementById('edit-msg');

      const formData = new FormData();
      formData.append('action', 'update');
      formData.append('UserID', id);
      formData.append('AdminID', adminID);
      formData.append('Comments', comments);

      fetch('people_handler.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            closeModal('edit-modal');
            showPopup('✅ Updated!', 'Admin Comment has been updated successfully.');
            loadUser();
          } else {
            msg.textContent = data.error || 'Failed to update';
            msg.className = 'result-msg error';
          }
        });
    }

    // ── Delete ──
    function openDeleteSelected() {
      if (!selectedID) {
        alert('Please select a user from the list first.');
        return;
      }
      const user = allUsers.find(a => a.UserID == selectedID);
      document.getElementById('delete-id').value = user.UserID;
      document.getElementById('delete-name').textContent = user.Username;
      document.getElementById('delete-msg').textContent  = '';
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function confirmDelete() {
      const id  = document.getElementById('delete-id').value;
      const msg = document.getElementById('delete-msg');

      const formData = new FormData();
      formData.append('action', 'delete');
      formData.append('UserID', id);

      fetch('people_handler.php', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            closeModal('delete-modal');
            showPopup('🗑️ Deleted!', 'Achievement and all related records have been deleted.');
            loadUser();
          } else {
            msg.textContent = data.error || 'Failed to delete';
            msg.className = 'result-msg error';
          }
        });
    }

    // ── Helpers ──
    function closeModal(id) {
      document.getElementById(id).style.display = 'none';
    }

    function showPopup(user, message) {
      document.getElementById('popup-user').textContent   = user;
      document.getElementById('popup-message').textContent = message;
      document.getElementById('popup').style.display = 'flex';
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }
    function loadJoin(){
    const isChecked = document.getElementById('filter-join').checked;

    if (!isChecked) {
        fetch('people_handler.php?action=unjoin')
            .then(res => res.json())
            .then(data => {
                allUsers = data;
                renderTable(data, false); 
            });
    } else {
        loadUser();
    }
    }

    // Close modal clicking outside
    ['edit-modal', 'add-modal', 'delete-modal', 'popup'].forEach(id => {
      document.getElementById(id).addEventListener('click', function(e) {
        if (e.target === this) this.style.display = 'none';
      });
    });
  </script>

</body>
</html>
