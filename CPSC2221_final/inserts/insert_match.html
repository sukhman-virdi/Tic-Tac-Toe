<!DOCTYPE html>
<html>
<head>
	<title>Insert Match - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert Match</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Match Record</h5></div>
		<div class="card-body">
			<form action="insert_match.php" method="post">
				<div class="mb-3">
					<label class="form-label">Match ID</label>
					<input type="text" name="MatchID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Match Date <span class="text-muted">(YYYY-MM-DD)</span></label>
					<input type="text" name="Match_Date" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Match Time <span class="text-muted">(HH:MM:SS)</span></label>
					<input type="text" name="Match_Time" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Winner ID <span class="text-muted">(leave blank if no winner yet)</span></label>
					<input type="text" name="Winner_ID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Tournament ID <span class="text-muted">(must match an existing Tournament ID)</span></label>
					<input type="text" name="TournamentID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Player 1 ID <span class="text-muted">(must match an existing Player ID)</span></label>
					<input type="text" name="Player1_ID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Player 2 ID <span class="text-muted">(must be a different Player ID)</span></label>
					<input type="text" name="Player2_ID" class="form-control">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert Match</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
