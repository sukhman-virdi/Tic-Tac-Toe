<!DOCTYPE html>
<html>
<head>
	<title>Insert Tournament - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert Tournament</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Tournament</h5></div>
		<div class="card-body">
			<form action="insert_tournament.php" method="post">
				<div class="mb-3">
					<label class="form-label">Tournament ID</label>
					<input type="text" name="TournamentID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Name</label>
					<input type="text" name="Name" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Difficulty <span class="text-muted">(1=Easy, 2=Medium, 3=Hard, 4=Expert, 5=Master)</span></label>
					<input type="text" name="Difficulty" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Start Date <span class="text-muted">(YYYY-MM-DD)</span></label>
					<input type="text" name="StartDate" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Manager ID <span class="text-muted">(must match an existing TournamentManager ID)</span></label>
					<input type="text" name="ManagerID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Supervisor ID <span class="text-muted">(must match an existing Admin ID)</span></label>
					<input type="text" name="SupervisorID" class="form-control">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert Tournament</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
