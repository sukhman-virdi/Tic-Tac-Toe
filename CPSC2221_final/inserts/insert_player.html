<!DOCTYPE html>
<html>
<head>
	<title>Insert Player - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert Player</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Player Profile</h5></div>
		<div class="card-body">
			<form action="insert_player.php" method="post">
				<div class="mb-3">
					<label class="form-label">Player ID <span class="text-muted">(must match an existing User ID)</span></label>
					<input type="text" name="PlayerID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Total Wins</label>
					<input type="text" name="TotalWins" class="form-control" value="0">
				</div>
				<div class="mb-3">
					<label class="form-label">Total Losses</label>
					<input type="text" name="TotalLosses" class="form-control" value="0">
				</div>
				<div class="mb-3">
					<label class="form-label">Total Draws</label>
					<input type="text" name="TotalDraws" class="form-control" value="0">
				</div>
				<div class="mb-3">
					<label class="form-label">Ranking Points</label>
					<input type="text" name="RankingPoints" class="form-control" value="0">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert Player</button>
			</form>
		</div>
	</div>
	<br><a href="../index.php" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
