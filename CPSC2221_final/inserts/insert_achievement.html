<!DOCTYPE html>
<html>
<head>
	<title>Insert Achievement - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert Achievement</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Achievement</h5></div>
		<div class="card-body">
			<form action="insert_achievement.php" method="post">
				<div class="mb-3">
					<label class="form-label">Achievement ID</label>
					<input type="text" name="AchievementID" class="form-control" placeholder="e.g. 6">
				</div>
				<div class="mb-3">
					<label class="form-label">Title</label>
					<input type="text" name="Title" class="form-control" placeholder="e.g. Speed Runner">
				</div>
				<div class="mb-3">
					<label class="form-label">Description</label>
					<input type="text" name="Description" class="form-control" placeholder="e.g. Win a match in under 5 moves">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert Achievement</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
