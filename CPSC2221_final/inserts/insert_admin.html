<!DOCTYPE html>
<html>
<head>
	<title>Insert Admin - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert Admin</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Administrator</h5></div>
		<div class="card-body">
			<form action="insert_admin.php" method="post">
				<div class="mb-3">
					<label class="form-label">Admin ID</label>
					<input type="text" name="AdminID" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Name</label>
					<input type="text" name="Name" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="text" name="Email" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Password</label>
					<input type="text" name="Password" class="form-control">
				</div>
				<div class="mb-3">
					<label class="form-label">Level <span class="text-muted">(1=Operations, 2=Management, 3=Moderation, 4=Support, 5=Development)</span></label>
					<input type="text" name="Level" class="form-control">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert Admin</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
