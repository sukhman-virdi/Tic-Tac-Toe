<!DOCTYPE html>
<html>
<head>
	<title>Insert Joins - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Register Player for Tournament</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New Joins Record</h5></div>
		<div class="card-body">
			<form action="insert_joins.php" method="post">
				<div class="mb-3">
					<label class="form-label">Player ID <span class="text-muted">(must match an existing Player ID)</span></label>
					<input type="text" name="PlayerID" class="form-control" placeholder="e.g. 1">
				</div>
				<div class="mb-3">
					<label class="form-label">Tournament ID <span class="text-muted">(must match an existing Tournament ID)</span></label>
					<input type="text" name="TournamentID" class="form-control" placeholder="e.g. 2">
				</div>
				<div class="mb-3">
					<label class="form-label">Join Date <span class="text-muted">(YYYY-MM-DD)</span></label>
					<input type="text" name="JoinDate" class="form-control" placeholder="e.g. 2025-03-01">
				</div>
				<button type="submit" class="btn btn-success w-100">Register Player</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
