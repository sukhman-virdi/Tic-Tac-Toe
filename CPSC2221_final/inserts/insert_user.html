<!DOCTYPE html>
<html>
<head>
	<title>Insert User - TicTacToe Platform</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
	<h1 class="mb-4">TicTacToe Platform - Insert User</h1>
	<div class="card" style="max-width: 500px;">
		<div class="card-header bg-success text-white"><h5 class="mb-0">New GameUser Registration</h5></div>
		<div class="card-body">
			<form action="insert_user.php" method="post">
				<div class="mb-3">
					<label class="form-label">User ID</label>
					<input type="text" name="UserID" class="form-control" placeholder="e.g. 14">
				</div>
				<div class="mb-3">
					<label class="form-label">Username</label>
					<input type="text" name="Username" class="form-control" placeholder="e.g. player_x">
				</div>
				<div class="mb-3">
					<label class="form-label">Email</label>
					<input type="text" name="Email" class="form-control" placeholder="e.g. player@email.com">
				</div>
				<div class="mb-3">
					<label class="form-label">Password</label>
					<input type="text" name="Password" class="form-control" placeholder="Enter password">
				</div>
				<button type="submit" class="btn btn-success w-100">Insert User</button>
			</form>
		</div>
	</div>
	<br><a href="../home.html" class="btn btn-secondary mt-2">Back to Main Menu</a>
</div>
</body>
</html>
